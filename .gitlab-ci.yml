# claude-code-marketplace — GitLab CI/CD
# Source of truth: gitlab.com/dev_squad/repo/tooling/claude-code-marketplace
# Public mirror: github.com/hyperdrive-bot/marketplace
#
# Pipeline:
#   1. quality      — shared security/quality gates from dev_squad/ci
#                     (semgrep · gitleaks · trivy · checkov · syft+grype · sonarqube)
#                     all upload to DefectDojo via DD_API_TOKEN
#   2. validate     — marketplace.json + plugin.json schema + registry/filesystem parity
#   3. deploy       — Vercel production deploy of docs/ landing
#   4. publish      — Mirror the validated commit back to GitHub main
#
# Required CI/CD variables:
#   PROJECT-level (set in Settings → CI/CD → Variables):
#     VERCEL_TOKEN         (masked, protected)
#     VERCEL_ORG_ID        (protected)
#     VERCEL_PROJECT_ID    (protected)
#     GITHUB_PUSH_TOKEN    (masked, protected) — PAT with repo:write, used as x-access-token
#     QUALITY_PRODUCT      — "claude-code-marketplace" (DefectDojo Product name)
#
#   GROUP-level (inherited from dev_squad/repo):
#     DD_API_TOKEN         (masked) — DefectDojo
#     SONAR_TOKEN          (masked) — SonarQube
#     QUALITY_DD_URL       — https://defectdojo.hyperdrive.bot
#     QUALITY_SONAR_URL    — https://sonarqube.hyperdrive.bot

# Run on branch pushes only; MR pipelines suppressed so the shared quality scans
# don't fire twice for the same SHA when a branch push has an open MR (matches
# api repo pattern — API-153).
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_COMMIT_BRANCH

image: node:22-alpine

# Pin all jobs to the sa-east-1 EKS light runner. This is the same runner family
# the api repo's quality jobs land on (eks-api/eks-live tags). It's required
# because the shared quality-gates.yml uses mirror.gcr.io/* images which the
# dev_squad runner config rewrites to a private ECR mirror in account 980082924943
# — only the in-account EKS runners have IAM auth to pull from it.
#
# eks-runner-live-sa-east-1-light tags: [k8s, sa-east-1, eks, eks-live, code-quality, vercel, low-priority, light]
default:
  tags:
    - code-quality
    - k8s
    - sa-east-1

stages:
  - bootstrap
  - quality
  - validate
  - deploy
  - publish

variables:
  GIT_DEPTH: "0"   # full history — publish:github needs it for the mirror push;
                   # sonarqube also wants it for accurate blame on new code

# Pull the shared security/quality gates from dev_squad/ci.
# Same template the api repo uses. See:
#   gitlab.com/dev_squad/ci/-/blob/master/steps/quality/quality-gates.yml
include:
  - project: 'dev_squad/ci'
    file: 'steps/quality/quality-gates.yml'
    ref: master

# ─── bootstrap ───────────────────────────────────────────────────────────────
#
# DefectDojo's `reimport-scan` endpoint (used by the shared .dd_upload anchor)
# requires the product/engagement/test to already exist — `auto_create_context`
# only takes effect on `import-scan`. On the first pipeline run for a brand-new
# QUALITY_PRODUCT, the reimports all 400 and quality:gate stays red forever.
#
# This job idempotently bootstraps the product by hitting `import-scan` ONCE
# with a tiny valid scan file. After it runs the first time, the product
# exists; subsequent runs see it and exit fast.

bootstrap:defectdojo:
  stage: bootstrap
  image: 980082924943.dkr.ecr.sa-east-1.amazonaws.com/ci-mirror/library/alpine:3.20
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      set -e
      if [ -z "${DD_API_TOKEN:-}" ] || [ -z "${QUALITY_DD_URL:-}" ]; then
        echo "DD_API_TOKEN/QUALITY_DD_URL not set — skipping bootstrap"
        exit 0
      fi
      ENC=$(printf '%s' "${QUALITY_PRODUCT}" | jq -sRr @uri)
      EXISTS=$(curl -sH "Authorization: Token ${DD_API_TOKEN}" \
        "${QUALITY_DD_URL}/api/v2/products/?name=${ENC}&limit=1" \
        | jq -r '.results[0].id // empty')
      if [ -n "$EXISTS" ]; then
        echo "✓ DefectDojo product '${QUALITY_PRODUCT}' exists (id=${EXISTS}) — bootstrap no-op"
        exit 0
      fi
      echo "Bootstrapping DefectDojo product '${QUALITY_PRODUCT}' via import-scan…"
      # Empty Gitleaks-shaped report — valid JSON array, no findings.
      # Gitleaks Scan is registered in every DefectDojo install and accepts
      # an empty `[]` as zero findings.
      echo '[]' > /tmp/bootstrap.json
      HTTP=$(curl -sS -o /tmp/import.json -w "%{http_code}" \
        -X POST "${QUALITY_DD_URL}/api/v2/import-scan/" \
        -H "Authorization: Token ${DD_API_TOKEN}" \
        -F "scan_type=Gitleaks Scan" \
        -F "file=@/tmp/bootstrap.json" \
        -F "product_name=${QUALITY_PRODUCT}" \
        -F "product_type_name=Research and Development" \
        -F "engagement_name=ci-bootstrap" \
        -F "auto_create_context=true")
      echo "import-scan HTTP ${HTTP}"
      head -c 500 /tmp/import.json; echo
      EXISTS=$(curl -sH "Authorization: Token ${DD_API_TOKEN}" \
        "${QUALITY_DD_URL}/api/v2/products/?name=${ENC}&limit=1" \
        | jq -r '.results[0].id // empty')
      if [ -z "$EXISTS" ]; then
        echo "❌ Bootstrap failed — product still not visible"
        exit 1
      fi
      echo "✓ Bootstrapped DefectDojo product '${QUALITY_PRODUCT}' (id=${EXISTS})"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ─── validate ────────────────────────────────────────────────────────────────

validate:manifests:
  stage: validate
  script:
    - apk add --no-cache python3
    - |
      python3 - <<'PY'
      import json, glob, sys

      errors = []

      # marketplace.json
      with open(".claude-plugin/marketplace.json") as f:
          mp = json.load(f)
      assert mp["name"] == "hyperdrive-bot", f"marketplace name must be 'hyperdrive-bot', got {mp['name']!r}"
      assert isinstance(mp["plugins"], list) and len(mp["plugins"]) > 0, "no plugins registered"
      registered = {p["name"] for p in mp["plugins"]}
      print(f"✓ marketplace.json valid · {len(registered)} plugins registered: {sorted(registered)}")

      # plugin.json for each
      on_disk = set()
      for pjson in glob.glob("plugins/*/.claude-plugin/plugin.json"):
          with open(pjson) as f:
              p = json.load(f)
          plugin_dir = pjson.split("/")[1]
          assert p["name"] == plugin_dir, f"{pjson}: name {p['name']!r} != directory {plugin_dir!r}"
          assert "version" in p, f"{pjson}: missing version"
          assert "description" in p, f"{pjson}: missing description"
          on_disk.add(p["name"])

      # registry ↔ filesystem parity
      orphans = registered - on_disk
      strays = on_disk - registered
      if orphans:
          errors.append(f"marketplace.json registers {orphans} but plugin.json missing on disk")
      if strays:
          errors.append(f"plugins/ contains {strays} not registered in marketplace.json")

      if errors:
          for e in errors:
              print(f"✗ {e}", file=sys.stderr)
          sys.exit(1)
      print(f"✓ all {len(on_disk)} plugins have valid plugin.json + match marketplace.json")
      PY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ─── deploy ──────────────────────────────────────────────────────────────────

deploy:landing:
  stage: deploy
  needs:
    - validate:manifests
    - job: quality:gitleaks    # gitleaks is the only hard-fail quality gate
                                # the rest run in parallel without blocking
  environment:
    name: production
    url: https://cc-marketplace.hyperdrive.bot
  before_script:
    - apk add --no-cache git
    - npm install -g vercel@latest
  script:
    - cd docs
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - vercel build --prod --token=$VERCEL_TOKEN
    - DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
    - echo "Deployed → $DEPLOY_URL"
    - echo "DEPLOY_URL=$DEPLOY_URL" >> deploy.env
  artifacts:
    reports:
      dotenv: docs/deploy.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"

# ─── publish ─────────────────────────────────────────────────────────────────

publish:github:
  stage: publish
  needs:
    - deploy:landing
  before_script:
    - apk add --no-cache git
  script:
    - git config user.email "gitlab-runner@dev-squad.com"
    - git config user.name "GitLab CI (claude-code-marketplace)"
    - git remote add github "https://x-access-token:${GITHUB_PUSH_TOKEN}@github.com/hyperdrive-bot/marketplace.git"
    - |
      echo "Pushing $CI_COMMIT_SHA to github.com/hyperdrive-bot/marketplace main..."
      git push github HEAD:refs/heads/main --tags
      echo "✓ GitHub mirror synced"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
